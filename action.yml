name: 'Katalyst Test Ingest'
description: 'Uploads JUnit and LCOV reports to Katalyst ingestion API'

inputs:
    katalyst_base_url:
        description: 'Base URL of Katalyst API, e.g. https://example.com'
        required: true

    ingest_token:
        description: 'Bearer token for Katalyst ingestion API'
        required: true

    github_token:
        description: 'GitHub token for PR comments and checks'
        required: false

    project_id:
        description: 'Katalyst project ID'
        required: false
        default: ''

    junit_path:
        description: 'Path to JUnit XML report'
        required: false
        default: 'junit.xml'

    lcov_path:
        description: 'Path to LCOV report'
        required: false
        default: 'coverage/lcov.info'

    endpoint:
        description: 'Ingest endpoint path'
        required: false
        default: '/ingest/runs'

    branch:
        description: 'Git branch name'
        required: false
        default: ''

    commit_sha:
        description: 'Git commit SHA'
        required: false
        default: ''

    repo_name:
        description: 'GitHub repository name'
        required: false
        default: ''

runs:
    using: 'composite'
    steps:
        - name: Validate inputs and files
          shell: bash
          run: |
              set -euo pipefail

              BASE="${{ inputs.katalyst_base_url }}"
              JUNIT="${{ inputs.junit_path }}"
              LCOV="${{ inputs.lcov_path }}"

              if [ -z "$BASE" ]; then
                echo "katalyst_base_url is required"
                exit 1
              fi

              if [ ! -f "$JUNIT" ]; then
                echo "JUnit report not found: $JUNIT"
                # Backend requires junit, so we should fail if it's completely missing
                exit 1
              fi

              if [ ! -f "$LCOV" ]; then
                echo "LCOV report not found: $LCOV. Proceeding without LCOV."
              else
                echo "Found LCOV report: $LCOV"
              fi

              echo "Found JUnit report: $JUNIT"

        - name: Publish Test Report Automation
          uses: mikepenz/action-junit-report@v4
          if: always()
          with:
            report_paths: ${{ inputs.junit_path }}
            token: ${{ inputs.github_token }}
            check_name: "Katalyst Test Report"
            fail_on_failure: false

        - name: Publish Code Coverage Comment
          uses: zgosalvez/github-actions-report-lcov@v4
          if: github.event_name == 'pull_request' && always()
          continue-on-error: true
          with:
            coverage-files: ${{ inputs.lcov_path }}
            minimum-coverage: 0
            github-token: ${{ inputs.github_token }}

        - name: Read Katalyst Smells Automatically
          shell: bash
          if: always()
          run: |
            if [ -f "katalyst-smells.json" ]; then
              echo "Parsing smells from katalyst-smells.json..."
              # Using jq to read a JSON report containing { file, line, title, message, severity }
              jq -c '.[]' katalyst-smells.json | while read -r issue; do
                FILE=$(echo "$issue" | jq -r '.file')
                LINE=$(echo "$issue" | jq -r '.line')
                TITLE=$(echo "$issue" | jq -r '.title')
                MSG=$(echo "$issue" | jq -r '.message')
                SEVERITY=$(echo "$issue" | jq -r '.severity // "error"')
                
                # Dynamically generate the annotation
                echo "::$SEVERITY file=$FILE,line=$LINE,title=$TITLE::$MSG"
              done
            else
              echo "katalyst-smells.json not found! Skipping dynamic code smell annotations."
            fi
        - name: Upload reports to Katalyst
          shell: bash
          if: always()
          env:
              INPUT_BRANCH: ${{ inputs.branch }}
              INPUT_COMMIT: ${{ inputs.commit_sha }}
              INPUT_REPO: ${{ inputs.repo_name }}
          run: |
              set -euo pipefail

              BASE="${{ inputs.katalyst_base_url }}"
              BASE="${BASE%/}"
              ENDPOINT="${{ inputs.endpoint }}"

              BRANCH="${INPUT_BRANCH:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
              COMMIT="${INPUT_COMMIT:-${GITHUB_SHA:-}}"
              REPO="${INPUT_REPO:-${GITHUB_REPOSITORY:-}}"

              echo "Uploading to: $BASE$ENDPOINT"
              echo "Branch: $BRANCH"
              echo "Commit: $COMMIT"
              echo "Repo: $REPO"

              CURL_CMD=(
                curl -sS --fail-with-body --retry 3 --retry-delay 2
                -X POST "$BASE$ENDPOINT"
                -H "Authorization: Bearer ${{ inputs.ingest_token }}"
                -F "branch=$BRANCH"
                -F "commit=$COMMIT"
                -F "repo=$REPO"
                -F "junit=@${{ inputs.junit_path }}"
              )
              
              if [ -f "${{ inputs.lcov_path }}" ]; then
                CURL_CMD+=( -F "lcov=@${{ inputs.lcov_path }}" )
              fi
              
              
              echo "Executing curl..."
              HTTP_STATUS=$( "${CURL_CMD[@]}" -w "%{http_code}" -o katalyst-response.json || echo "FAILED" )
              
              echo "HTTP Status: $HTTP_STATUS"
              echo "Response body:"
              cat katalyst-response.json || echo "No response body found"
              
              if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
                # Extract projectId from response
                EXTRACTED_PROJECT_ID=$(jq -r '.projectId // empty' katalyst-response.json)
                echo "Extracted Project ID: $EXTRACTED_PROJECT_ID"
                if [ -n "$EXTRACTED_PROJECT_ID" ]; then
                  echo "api_project_id=$EXTRACTED_PROJECT_ID" >> $GITHUB_ENV
                fi
              else
                echo "Failed to upload to Katalyst. HTTP Status: $HTTP_STATUS"
                # Do not exit here so we don't break subsequent always() steps, but note the failure
              fi

        - name: Add Dashboard Link to Summary and PR
          shell: bash
          if: always()
          env:
              API_PROJECT_ID: ${{ env.api_project_id }}
              INPUT_PROJECT_ID: ${{ inputs.project_id }}
              INPUT_BRANCH: ${{ inputs.branch }}
              GH_TOKEN: ${{ inputs.github_token }}
              PR_NUMBER: ${{ github.event.pull_request.number }}
          run: |
              PROJECT_ID="${API_PROJECT_ID:-$INPUT_PROJECT_ID}"
              BRANCH="${INPUT_BRANCH:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
              COMMIT="${{ github.event.pull_request.head.sha || github.sha }}"
              
              echo "DEBUG: api_project_id='$api_project_id'"
              echo "DEBUG: INPUT_PROJECT_ID='$INPUT_PROJECT_ID'"
              echo "DEBUG: PROJECT_ID='$PROJECT_ID'"
              echo "DEBUG: BRANCH='$BRANCH'"
              echo "DEBUG: COMMIT='$COMMIT'"
              
              if [ -n "$PROJECT_ID" ]; then
                # Direct URL without redirect parameter
                FULL_URL="http://localhost:4200/project/$PROJECT_ID/code-coverage"

                # Write to GITHUB_STEP_SUMMARY
                echo "### 📊 Code Coverage Dashboard" >> $GITHUB_STEP_SUMMARY
                echo "🔗 **[Code Coverage Dashboard]($FULL_URL)**" >> $GITHUB_STEP_SUMMARY
                
                # Check if it's a PR and we have a token. If it's a push event, PR_NUMBER might be empty, so try to find it.
                if [ -z "$PR_NUMBER" ] && [ -n "$GH_TOKEN" ]; then
                  echo "PR_NUMBER is empty, attempting to find open PR for commit '$COMMIT'..."
                  PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/$COMMIT/pulls --jq '.[0].number' || echo "")
                  echo "Found PR_NUMBER via gh api: '$PR_NUMBER'"
                fi

                echo "DEBUG: Final PR_NUMBER='$PR_NUMBER'"

                if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ] && [ -n "$GH_TOKEN" ]; then
                  COMMENT_BODY="### 📊 Code Coverage Dashboard<br><br>🔗 **[Code Coverage Dashboard]($FULL_URL)**"

                  # Find existing comment
                  echo "Finding existing comment on PR $PR_NUMBER..."
                  COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments --jq '.[] | select(.body | startswith("### 📊 Code Coverage Dashboard")) | .id' | tail -n 1)
                  echo "Found COMMENT_ID: '$COMMENT_ID'"
                  
                  if [ -n "$COMMENT_ID" ]; then
                    echo "Updating existing PR comment..."
                    gh api -X PATCH repos/${{ github.repository }}/issues/comments/$COMMENT_ID -f body="$COMMENT_BODY"
                  else
                    echo "Creating new PR comment..."
                    gh pr comment $PR_NUMBER --body "$COMMENT_BODY"
                  fi
                else
                  echo "Skipping PR comment: PR_NUMBER or GH_TOKEN is missing."
                fi
              else
                echo "Skipping Dashboard Link creation: PROJECT_ID is empty."
              fi