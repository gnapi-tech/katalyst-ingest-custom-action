name: 'Katalyst Test Ingest'
description: 'Uploads JUnit and LCOV reports to Katalyst ingestion API'

inputs:
    katalyst_base_url:
        description: 'Base URL of Katalyst API, e.g. https://example.com'
        required: true

    ingest_token:
        description: 'Bearer token for Katalyst ingestion API'
        required: true

    github_token:
        description: 'GitHub token for PR comments and checks'
        required: false

    project_id:
        description: 'Katalyst project ID'
        required: false
        default: ''

    junit_path:
        description: 'Path to JUnit XML report'
        required: false
        default: 'junit.xml'

    lcov_path:
        description: 'Path to LCOV report'
        required: false
        default: 'coverage/lcov.info'

    endpoint:
        description: 'Ingest endpoint path'
        required: false
        default: '/ingest/runs'

    branch:
        description: 'Git branch name'
        required: false
        default: ''

    commit_sha:
        description: 'Git commit SHA'
        required: false
        default: ''

    repo_name:
        description: 'GitHub repository name'
        required: false
        default: ''

    dashboard_base_url:
        description: 'Base URL of the Katalyst Dashboard UI, e.g. https://dashboard.example.com'
        required: false
        default: ''

runs:
    using: 'composite'
    steps:
        - name: Validate inputs and files
          shell: bash
          run: |
              set -euo pipefail

              BASE="${{ inputs.katalyst_base_url }}"
              JUNIT="${{ inputs.junit_path }}"
              LCOV="${{ inputs.lcov_path }}"

              if [ -z "$BASE" ]; then
                echo "katalyst_base_url is required"
                exit 1
              fi

              if [ ! -f "$JUNIT" ]; then
                echo "JUnit report not found: $JUNIT"
                exit 1
              fi

              if [ ! -f "$LCOV" ]; then
                echo "LCOV report not found: $LCOV"
                exit 1
              fi

              echo "Found JUnit report: $JUNIT"
              echo "Found LCOV report: $LCOV"

        - name: Publish Test Report Automation
          uses: mikepenz/action-junit-report@v4
          if: always()
          with:
            report_paths: ${{ inputs.junit_path }}
            token: ${{ inputs.github_token }}
            check_name: "Katalyst Test Report"
            fail_on_failure: false

        - name: Publish Code Coverage Comment
          uses: zgosalvez/github-actions-report-lcov@v4
          if: github.event_name == 'pull_request' && always()
          continue-on-error: true
          with:
            coverage-files: ${{ inputs.lcov_path }}
            minimum-coverage: 0
            github-token: ${{ inputs.github_token }}

        - name: Read Katalyst Smells Automatically
          shell: bash
          if: always()
          run: |
            if [ -f "katalyst-smells.json" ]; then
              echo "Parsing smells from katalyst-smells.json..."
              # Using jq to read a JSON report containing { file, line, title, message, severity }
              jq -c '.[]' katalyst-smells.json | while read -r issue; do
                FILE=$(echo "$issue" | jq -r '.file')
                LINE=$(echo "$issue" | jq -r '.line')
                TITLE=$(echo "$issue" | jq -r '.title')
                MSG=$(echo "$issue" | jq -r '.message')
                SEVERITY=$(echo "$issue" | jq -r '.severity // "error"')
                
                # Dynamically generate the annotation
                echo "::$SEVERITY file=$FILE,line=$LINE,title=$TITLE::$MSG"
              done
            else
              echo "katalyst-smells.json not found! Skipping dynamic code smell annotations."
            fi
        - name: Upload reports to Katalyst
          shell: bash
          env:
              INPUT_BRANCH: ${{ inputs.branch }}
              INPUT_COMMIT: ${{ inputs.commit_sha }}
              INPUT_REPO: ${{ inputs.repo_name }}
          run: |
              set -euo pipefail

              BASE="${{ inputs.katalyst_base_url }}"
              BASE="${BASE%/}"
              ENDPOINT="${{ inputs.endpoint }}"

              BRANCH="${INPUT_BRANCH:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
              COMMIT="${INPUT_COMMIT:-${GITHUB_SHA:-}}"
              REPO="${INPUT_REPO:-${GITHUB_REPOSITORY:-}}"

              echo "Uploading to: $BASE$ENDPOINT"
              echo "Branch: $BRANCH"
              echo "Commit: $COMMIT"
              echo "Repo: $REPO"

              curl -sS --fail-with-body --retry 3 --retry-delay 2 \
                -X POST "$BASE$ENDPOINT" \
                -H "Authorization: Bearer ${{ inputs.ingest_token }}" \
                -F "branch=$BRANCH" \
                -F "commit=$COMMIT" \
                -F "repo=$REPO" \
                -F "junit=@${{ inputs.junit_path }}" \
                -F "lcov=@${{ inputs.lcov_path }}" > katalyst-response.json
              
              cat katalyst-response.json
              
              # Extract projectId from response
              EXTRACTED_PROJECT_ID=$(jq -r '.projectId // empty' katalyst-response.json)
              if [ -n "$EXTRACTED_PROJECT_ID" ]; then
                echo "api_project_id=$EXTRACTED_PROJECT_ID" >> $GITHUB_ENV
              fi

        - name: Add Dashboard Link to Summary
          shell: bash
          if: always()
          env:
              INPUT_PROJECT_ID: ${{ inputs.project_id }}
              INPUT_BRANCH: ${{ inputs.branch }}
              INPUT_DASHBOARD_URL: ${{ inputs.dashboard_base_url }}
          run: |
              PROJECT_ID="${api_project_id:-$INPUT_PROJECT_ID}"
              BRANCH="${INPUT_BRANCH:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
              DASHBOARD_BASE="${INPUT_DASHBOARD_URL%/}"

              if [ -n "$PROJECT_ID" ] && [ -n "$DASHBOARD_BASE" ]; then
                DASHBOARD_LINK="$DASHBOARD_BASE/project/$PROJECT_ID/code-coverage?branch=$BRANCH"
                # Write to GITHUB_STEP_SUMMARY
                echo "### 📊 Katalyst Dashboard" >> $GITHUB_STEP_SUMMARY
                echo "🔗 **[View Code Coverage Report for branch \`$BRANCH\`]($DASHBOARD_LINK)**" >> $GITHUB_STEP_SUMMARY
              fi

        - name: Add Dashboard Link to PR Comment
          uses: actions/github-script@v7
          if: github.event_name == 'pull_request' && always()
          env:
            INPUT_PROJECT_ID: ${{ inputs.project_id }}
            INPUT_BRANCH: ${{ inputs.branch }}
            INPUT_DASHBOARD_URL: ${{ inputs.dashboard_base_url }}
          with:
            github-token: ${{ inputs.github_token }}
            script: |
              const projectId = process.env.api_project_id || process.env.INPUT_PROJECT_ID;
              const branch = process.env.INPUT_BRANCH || process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME;
              let dashboardBase = process.env.INPUT_DASHBOARD_URL;
              
              if (!projectId || !dashboardBase) {
                console.log('Missing project ID or dashboard URL. Skipping PR comment.');
                return;
              }
              
              dashboardBase = dashboardBase.replace(/\/$/, '');
              const dashboardLink = `${dashboardBase}/project/${projectId}/code-coverage?branch=${branch}`;
              const commentBody = `### 📊 Katalyst Dashboard\n\n🔗 **[View Code Coverage Report for branch \`${branch}\`](${dashboardLink})**`;
              
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('### 📊 Katalyst Dashboard'));
              
              if (botComment) {
                console.log(`Updating existing comment ${botComment.id}`);
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: commentBody
                });
              } else {
                console.log('Creating new comment');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
              }